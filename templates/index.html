<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Monitoring QoS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4">📊 Performance & Tests (Point 4 & 5)</h1>

    <div class="card shadow-sm mb-5">
        <div class="card-body">
            <h5 class="card-title">Évolution de la Latence (en secondes)</h5>
            <canvas id="latencyChart" height="100"></canvas>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Historique des Exécutions</h5>
            <table class="table table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Date d'exécution</th>
                        <th>Statut</th>
                        <th>Latence</th>
                    </tr>
                </thead>
                <tbody>
                    {% for run in runs %}
                    <tr>
                        <td>{{ run.timestamp }}</td>
                        <td>
                            <span class="badge {{ 'bg-success' if run.status == 'SUCCESS' else 'bg-danger' }}">
                                {{ run.status }}
                            </span>
                        </td>
                        <td>{{ run.latency }}s</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Préparation des données pour le graphique
    const labels = [{% for run in chart_data %}"{{ run.timestamp[-8:] }}",{% endfor %}];
    const dataLatency = [{% for run in chart_data %}{{ run.latency }},{% endfor %}];

    const ctx = document.getElementById('latencyChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Latence de l\'API (s)',
                data: dataLatency,
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13, 110, 253, 0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>
</body>
</html>
